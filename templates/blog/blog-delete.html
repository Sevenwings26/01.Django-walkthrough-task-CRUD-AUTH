{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="delete-container">
    <h2>Are you sure?</h2>
    <p>You are about to delete the post: <strong>"{{ blog_post.title }}"</strong></p>
    <p class="warning-text">This action cannot be undone.</p>

    <form method="POST">
        {% csrf_token %}
        
        <button type="submit" class="btn-delete">Yes, Delete Permanently</button>
        
        <a href="{% url 'blog-index' %}" class="btn-cancel">Cancel and Go Back</a>
    </form>
</div>

<style>
    .delete-container {
        max-width: 500px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ffcccc;
        background-color: #fffafa;
        border-radius: 8px;
        text-align: center;
        font-family: sans-serif;
    }
    
    .warning-text {
        color: #d9534f;
        font-style: italic;
        margin-bottom: 20px;
    }

    .btn-delete {
        background-color: #d9534f; /* Danger Red */
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    .btn-delete:hover {
        background-color: #c9302c;
    }

    .btn-cancel {
        display: inline-block;
        margin-left: 10px;
        text-decoration: none;
        color: #666;
        font-size: 14px;
    }

    .btn-cancel:hover {
        text-decoration: underline;
    }
</style>

{% endblock %}
